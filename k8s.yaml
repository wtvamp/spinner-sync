apiVersion: v1
kind: Namespace
metadata:
  name: spinner
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spinner
  namespace: spinner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spinner
  template:
    metadata:
      labels:
        app: spinner
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: spinner
          image: ghcr.io/wtvamp/spinner-sync:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: spinner
  namespace: spinner
spec:
  selector:
    app: spinner
  ports:
    - port: 80
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: spinner
  namespace: spinner
  annotations:
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/proxy-set-headers: "spinner/spinner-ws-headers"
    nginx.org/websocket-services: "spinner"
spec:
  ingressClassName: nginx
  rules:
    - host: spinner.uplifttech.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: spinner
                port:
                  number: 80
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: spinner-ws-headers
  namespace: spinner
data:
  Upgrade: $http_upgrade
  Connection: "Upgrade"
