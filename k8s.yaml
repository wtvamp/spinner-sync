apiVersion: v1
kind: Namespace
metadata:
  name: spinner
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spinner
  namespace: spinner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spinner
  template:
    metadata:
      labels:
        app: spinner
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: spinner
          image: ghcr.io/wtvamp/spinner-sync:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: spinner
  namespace: spinner
spec:
  selector:
    app: spinner
  ports:
    - port: 80
      targetPort: 3000
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: spinner
  namespace: spinner
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - spinner.uplifttech.org
      secretName: spinner-tls
  rules:
    - host: spinner.uplifttech.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: spinner
                port:
                  number: 80
