<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prize Spinner!</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<script src="/socket.io/socket.io.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a0e2e;
    font-family: 'Press Start 2P', cursive;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    image-rendering: pixelated;
  }

  .stars-container {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 0;
  }

  .star {
    position: absolute;
    background: #fff;
    border-radius: 50%;
    animation: twinkle var(--dur) ease-in-out infinite;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.2; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.5); }
  }

  .flower {
    position: fixed;
    font-size: 24px;
    animation: floatUp var(--dur) linear infinite;
    opacity: 0.7;
    z-index: 0;
    pointer-events: none;
  }

  @keyframes floatUp {
    0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
    10% { opacity: 0.7; }
    90% { opacity: 0.7; }
    100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
  }

  .firefly {
    position: fixed;
    width: 6px;
    height: 6px;
    background: #ffe066;
    border-radius: 50%;
    box-shadow: 0 0 8px 4px rgba(255, 224, 102, 0.6);
    animation: fireflyMove var(--dur) ease-in-out infinite;
    z-index: 1;
    pointer-events: none;
  }

  @keyframes fireflyMove {
    0% { transform: translate(0, 0); opacity: 0; }
    15% { opacity: 1; }
    50% { transform: translate(var(--dx), var(--dy)); opacity: 0.6; }
    85% { opacity: 1; }
    100% { transform: translate(var(--dx2), var(--dy2)); opacity: 0; }
  }

  .title {
    color: #ffd700;
    font-size: 28px;
    text-shadow: 3px 3px 0 #8b4513, -1px -1px 0 #ff69b4;
    margin-bottom: 20px;
    z-index: 10;
    text-align: center;
    line-height: 1.6;
    animation: titleBounce 2s ease-in-out infinite;
  }

  @keyframes titleBounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
  }

  .spinner-wrapper {
    position: relative;
    z-index: 10;
  }

  .arrow {
    position: absolute;
    top: 50%;
    right: -30px;
    transform: translateY(-50%);
    width: 0;
    height: 0;
    border-top: 20px solid transparent;
    border-bottom: 20px solid transparent;
    border-right: 35px solid #ffd700;
    filter: drop-shadow(0 0 6px rgba(255, 215, 0, 0.8));
    z-index: 20;
  }

  canvas#wheel {
    border-radius: 50%;
    box-shadow:
      0 0 30px rgba(255, 182, 193, 0.5),
      0 0 60px rgba(147, 112, 219, 0.3),
      inset 0 0 30px rgba(255, 255, 255, 0.1);
    cursor: pointer;
    transition: box-shadow 0.3s;
  }

  canvas#wheel:hover {
    box-shadow:
      0 0 40px rgba(255, 182, 193, 0.7),
      0 0 80px rgba(147, 112, 219, 0.5),
      inset 0 0 30px rgba(255, 255, 255, 0.2);
  }

  .spin-btn {
    margin-top: 25px;
    padding: 15px 40px;
    font-family: 'Press Start 2P', cursive;
    font-size: 16px;
    background: linear-gradient(180deg, #ff9a9e, #e8637a);
    color: #fff;
    border: 4px solid #ffd700;
    border-radius: 12px;
    cursor: pointer;
    z-index: 10;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
    box-shadow: 0 6px 0 #b8445a, 0 8px 20px rgba(0,0,0,0.3);
    transition: all 0.1s;
    position: relative;
  }

  .spin-btn:hover {
    background: linear-gradient(180deg, #ffb3b7, #ff7b93);
    transform: translateY(-2px);
    box-shadow: 0 8px 0 #b8445a, 0 10px 25px rgba(0,0,0,0.3);
  }

  .spin-btn:active {
    transform: translateY(4px);
    box-shadow: 0 2px 0 #b8445a, 0 3px 10px rgba(0,0,0,0.3);
  }

  .spin-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
  }

  .winner-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(26, 14, 46, 0.92);
    z-index: 100;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    animation: fadeIn 0.5s;
  }

  .winner-overlay.show { display: flex; }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .winner-text {
    font-size: 18px;
    color: #ffb6c1;
    margin-bottom: 15px;
    text-shadow: 2px 2px 0 #8b4513;
  }

  .winner-name {
    font-size: 42px;
    color: #ffd700;
    text-shadow: 3px 3px 0 #8b4513, 0 0 30px rgba(255, 215, 0, 0.6);
    animation: winnerPop 0.6s ease-out, winnerGlow 1.5s ease-in-out infinite 0.6s;
    margin-bottom: 20px;
  }

  @keyframes winnerPop {
    0% { transform: scale(0); opacity: 0; }
    60% { transform: scale(1.3); }
    100% { transform: scale(1); opacity: 1; }
  }

  @keyframes winnerGlow {
    0%, 100% { text-shadow: 3px 3px 0 #8b4513, 0 0 30px rgba(255, 215, 0, 0.6); }
    50% { text-shadow: 3px 3px 0 #8b4513, 0 0 60px rgba(255, 215, 0, 0.9), 0 0 90px rgba(255, 182, 193, 0.5); }
  }

  .winner-sparkles {
    position: absolute;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  .sparkle {
    position: absolute;
    font-size: 28px;
    animation: sparkleFloat var(--dur) linear infinite;
  }

  @keyframes sparkleFloat {
    0% { transform: translateY(0) rotate(0) scale(0); opacity: 0; }
    20% { opacity: 1; transform: scale(1); }
    80% { opacity: 1; }
    100% { transform: translateY(-200px) rotate(720deg) scale(0); opacity: 0; }
  }

  .close-btn {
    margin-top: 20px;
    padding: 12px 30px;
    font-family: 'Press Start 2P', cursive;
    font-size: 12px;
    background: linear-gradient(180deg, #9b59b6, #7d3c98);
    color: #fff;
    border: 3px solid #ffd700;
    border-radius: 10px;
    cursor: pointer;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
    box-shadow: 0 4px 0 #5b2c6f;
    transition: all 0.1s;
  }

  .close-btn:hover {
    background: linear-gradient(180deg, #af7ac5, #9b59b6);
    transform: translateY(-2px);
  }

  .close-btn:active {
    transform: translateY(2px);
    box-shadow: 0 2px 0 #5b2c6f;
  }

  .grass {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 40px;
    background:
      repeating-linear-gradient(90deg,
        #3a7d44 0px, #3a7d44 8px,
        #2d6b35 8px, #2d6b35 16px,
        #4a9d54 16px, #4a9d54 24px,
        #2d6b35 24px, #2d6b35 32px);
    z-index: 5;
    image-rendering: pixelated;
  }

  .grass::before {
    content: '';
    position: absolute;
    top: -12px;
    left: 0;
    right: 0;
    height: 12px;
    background:
      repeating-linear-gradient(90deg,
        transparent 0px, transparent 4px,
        #3a7d44 4px, #3a7d44 8px,
        transparent 8px, transparent 16px,
        #4a9d54 16px, #4a9d54 20px,
        transparent 20px, transparent 28px,
        #2d6b35 28px, #2d6b35 32px);
  }

  .music-btn {
    position: fixed;
    top: 15px;
    right: 15px;
    padding: 8px 12px;
    font-family: 'Press Start 2P', cursive;
    font-size: 10px;
    background: rgba(147, 112, 219, 0.5);
    color: #ffd700;
    border: 2px solid #ffd700;
    border-radius: 8px;
    cursor: pointer;
    z-index: 50;
  }

  .viewer-panel {
    position: fixed;
    top: 12px;
    left: 12px;
    padding: 10px 14px;
    font-family: 'Press Start 2P', cursive;
    font-size: 8px;
    color: #84fab0;
    z-index: 50;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.5);
    background: rgba(26, 14, 46, 0.75);
    border: 2px solid rgba(132, 250, 176, 0.3);
    border-radius: 10px;
    max-width: 240px;
  }

  .viewer-panel .panel-title {
    color: #ffd700;
    font-size: 9px;
    margin-bottom: 8px;
    text-shadow: 1px 1px 0 #8b4513;
  }

  .viewer-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }

  .viewer-list li {
    padding: 4px 0;
    color: #ffb6c1;
    font-size: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .viewer-list li img {
    width: 32px;
    height: 32px;
    image-rendering: pixelated;
    border: 1px solid rgba(255,215,0,0.4);
    border-radius: 3px;
    flex-shrink: 0;
    background: rgba(26, 14, 46, 0.5);
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .join-toast {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Press Start 2P', cursive;
    font-size: 14px;
    color: #84fab0;
    text-shadow: 2px 2px 0 #1a0e2e;
    z-index: 90;
    pointer-events: none;
    animation: toastPop 1.5s ease-out forwards;
    white-space: nowrap;
  }

  @keyframes toastPop {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
    20% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
    40% { transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -80%) scale(1); }
  }

  /* Modals */
  .modal {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(26, 14, 46, 0.95);
    z-index: 200;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }

  .modal.hidden { display: none; }

  .modal h2 {
    color: #ffd700;
    font-family: 'Press Start 2P', cursive;
    font-size: 20px;
    text-shadow: 3px 3px 0 #8b4513;
    text-align: center;
    line-height: 1.8;
  }

  .modal p {
    color: #ffb6c1;
    font-family: 'Press Start 2P', cursive;
    font-size: 10px;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
  }

  .name-input {
    font-family: 'Press Start 2P', cursive;
    font-size: 16px;
    padding: 12px 20px;
    border: 3px solid #ffd700;
    border-radius: 10px;
    background: rgba(255, 255, 255, 0.1);
    color: #fff;
    text-align: center;
    outline: none;
    width: 280px;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
  }

  .name-input::placeholder {
    color: rgba(255, 182, 193, 0.5);
    font-size: 11px;
  }

  .name-input:focus {
    border-color: #ff69b4;
    box-shadow: 0 0 20px rgba(255, 105, 180, 0.4);
  }

  .modal-btn {
    padding: 12px 35px;
    font-family: 'Press Start 2P', cursive;
    font-size: 14px;
    background: linear-gradient(180deg, #84fab0, #5bc990);
    color: #1a0e2e;
    border: 3px solid #ffd700;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 5px 0 #3a9d6a, 0 7px 15px rgba(0,0,0,0.3);
    transition: all 0.1s;
  }

  .modal-btn:hover {
    background: linear-gradient(180deg, #a0ffc8, #84fab0);
    transform: translateY(-2px);
    box-shadow: 0 7px 0 #3a9d6a, 0 9px 20px rgba(0,0,0,0.3);
  }

  .modal-btn:active {
    transform: translateY(3px);
    box-shadow: 0 2px 0 #3a9d6a;
  }

  /* Avatar grid */
  .avatar-grid {
    display: grid;
    grid-template-columns: repeat(5, 80px);
    gap: 10px;
    max-height: 380px;
    overflow-y: auto;
    padding: 10px;
  }

  .avatar-option {
    width: 80px;
    height: 80px;
    border: 3px solid rgba(255, 215, 0, 0.3);
    border-radius: 8px;
    cursor: pointer;
    background: rgba(255, 255, 255, 0.05);
    padding: 4px;
    transition: all 0.15s;
    image-rendering: pixelated;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .avatar-option:hover {
    border-color: #ff69b4;
    transform: scale(1.1);
    background: rgba(255, 105, 180, 0.15);
  }

  .avatar-option.selected {
    border-color: #ffd700;
    background: rgba(255, 215, 0, 0.2);
    box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
    transform: scale(1.1);
  }

  .avatar-option img {
    width: 100%;
    height: 100%;
    image-rendering: pixelated;
  }

  .selected-preview {
    width: 96px;
    height: 96px;
    image-rendering: pixelated;
    border: 3px solid #ffd700;
    border-radius: 10px;
    background: rgba(255, 255, 255, 0.05);
  }
</style>
</head>
<body>

<div class="stars-container" id="stars"></div>
<div id="flowers"></div>
<div id="fireflies"></div>

<!-- Step 1: Name entry -->
<div class="modal" id="nameModal">
  <h2>Prize Drawing!</h2>
  <p>Enter your name to join</p>
  <input type="text" class="name-input" id="nameInput" placeholder="Your name..." maxlength="20" autocomplete="off">
  <button class="modal-btn" onclick="goToAvatarSelect()">NEXT</button>
</div>

<!-- Step 2: Avatar selection -->
<div class="modal hidden" id="avatarModal">
  <h2>Choose Your Avatar!</h2>
  <canvas class="selected-preview" id="avatarPreview" width="64" height="64"></canvas>
  <div class="avatar-grid" id="avatarGrid"></div>
  <button class="modal-btn" onclick="joinRoom()">JOIN</button>
</div>

<div class="viewer-panel" id="viewerPanel">
  <div class="panel-title">Who's Here:</div>
  <ul class="viewer-list" id="viewerList"></ul>
</div>

<div class="title">Prize Drawing!</div>

<div class="spinner-wrapper">
  <div class="arrow"></div>
  <canvas id="wheel" width="400" height="400"></canvas>
</div>

<button class="spin-btn" id="spinBtn" onclick="requestSpin()">SPIN!</button>

<div class="winner-overlay" id="winnerOverlay">
  <div class="winner-sparkles" id="winnerSparkles"></div>
  <div class="winner-text">The winner is...</div>
  <div class="winner-name" id="winnerName"></div>
  <button class="close-btn" onclick="closeOverlay()">Spin Again!</button>
</div>

<div class="grass"></div>

<button class="music-btn" id="musicBtn" onclick="toggleMusic()">Music: OFF</button>

<script>
// ========================================
// STARDEW VALLEY STYLE AVATAR GENERATOR (64x64)
// Authentic SDV portrait style: 64x64, 5-6 shades per feature,
// top-right light source, hue-shifted shadows (cooler) and highlights (warmer)
// ========================================
const AV = 64;
const avatarDataUrls = [];

// Color helpers with hue-shifting (SDV technique: shadows go cooler, highlights go warmer)
function hexToRgb(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function rgb(r,g,b){return'rgb('+Math.round(Math.max(0,Math.min(255,r)))+','+Math.round(Math.max(0,Math.min(255,g)))+','+Math.round(Math.max(0,Math.min(255,b)))+')';}
function shade(hex,mult,warmShift){
  let[r,g,b]=hexToRgb(hex);
  r*=mult;g*=mult;b*=mult;
  if(warmShift>0){r+=warmShift*30;g+=warmShift*10;b-=warmShift*15;} // warmer
  if(warmShift<0){r+=warmShift*10;g+=warmShift*5;b-=warmShift*20;}  // cooler
  return rgb(r,g,b);
}

function px(c,x,y,col){c.fillStyle=col;c.fillRect(x,y,1,1);}
function rect(c,x,y,w,h,col){c.fillStyle=col;c.fillRect(x,y,w,h);}
function ellipse(c,cx,cy,rx,ry,col){
  c.fillStyle=col;
  for(let y=-ry;y<=ry;y++)for(let x=-rx;x<=rx;x++)
    if((x*x)/(rx*rx)+(y*y)/(ry*ry)<=1)c.fillRect(cx+x,cy+y,1,1);
}

// SDV-accurate palettes: 5-6 shades each, hue-shifted (shadows cooler, highlights warmer)
// Extracted from actual SDV character portraits
const SKINS = [
  // Light (Abigail/Haley-like)
  {s:['#5c3a28','#8a6040','#c49060','#e8bb8c','#f5dab8','#fef0e0']},
  // Fair (Emily-like)
  {s:['#604830','#906848','#c89870','#e8c098','#f5dcc0','#fff0e0']},
  // Medium (Leah-like)
  {s:['#503020','#784828','#a87048','#c89068','#e0b088','#f0d0b0']},
  // Tan
  {s:['#402818','#604020','#886038','#a88050','#c8a070','#e0c090']},
  // Brown
  {s:['#301810','#483018','#684828','#886040','#a88060','#c0a080']},
  // Dark
  {s:['#201008','#382018','#503020','#684030','#886048','#a08060']},
];

const HAIRS = [
  // dark brown - like Shane
  {h:['#0c0804','#1c1008','#2c1c10','#3c2818','#503820','#684830']},
  // auburn - like Leah
  {h:['#281008','#481810','#703020','#904828','#b06030','#c87840']},
  // ginger - like Penny
  {h:['#482008','#684010','#906020','#b88030','#d8a040','#e8b858']},
  // blonde - like Haley
  {h:['#584010','#786020','#a88830','#c8a840','#e0c858','#f0e080']},
  // red
  {h:['#380808','#581010','#882020','#b03030','#d04040','#e06050']},
  // pink - like Emily's streak
  {h:['#501838','#783060','#a04880','#c060a0','#d878b8','#e890c8']},
  // purple - like Abigail
  {h:['#180830','#301060','#482088','#6030a8','#7848c0','#9060d0']},
  // blue
  {h:['#081830','#102860','#204088','#3060a8','#4878c0','#6090d0']},
  // teal
  {h:['#082820','#103828','#205040','#306850','#488068','#60a080']},
  // black
  {h:['#080808','#101010','#1c1c1c','#282828','#383838','#484848']},
];

const EYES_PAL = [
  ['#0c1830','#183060','#285088','#3870a8'],   // blue
  ['#081808','#103818','#205828','#387838'],     // green
  ['#180c08','#382010','#584018','#786028'],     // brown
  ['#180830','#301060','#502088','#7040a0'],     // purple
  ['#301008','#581818','#803028','#a04838'],     // dark red/maroon
  ['#081820','#103040','#205060','#387080'],     // grey-blue
];

const SHIRTS_PAL = [
  // red - like Abigail's
  {c:['#381010','#602020','#983030','#c04040','#d85858','#e87070']},
  // blue - like Emily's
  {c:['#081830','#183060','#284888','#3868a8','#5080c0','#6898d0']},
  // green
  {c:['#082010','#103818','#205830','#308048','#48a060','#60b878']},
  // gold/yellow
  {c:['#302008','#584010','#806020','#a88030','#c8a040','#e0b858']},
  // purple
  {c:['#180830','#301060','#482888','#6840a0','#8058b8','#9870c8']},
  // pink/rose
  {c:['#381028','#602040','#883858','#a85070','#c86888','#d880a0']},
  // teal
  {c:['#082028','#103840','#205860','#308078','#48a098','#60b8b0']},
  // orange
  {c:['#382008','#604010','#886020','#b08028','#c89838','#e0b048']},
  // white/cream
  {c:['#808080','#a0a0a0','#b8b8b8','#d0d0d0','#e8e8e8','#f8f8f8']},
  // pastel pink
  {c:['#503040','#785060','#987080','#b890a0','#d0a8b8','#e0c0d0']},
];

const OUTFITS = ['tee','blouse','overalls','dress','hoodie','collar'];
const ACC = ['none','none','bow','flower_crown','headband','earrings','necklace','glasses','hat','bandana'];

function generateAvatar(seed) {
  const c = document.createElement('canvas');
  c.width = 64; c.height = 64;
  const ctx = c.getContext('2d');

  let s = (seed * 2654435761 + 137) >>> 0;
  function rng(){s^=s<<13;s^=s>>17;s^=s<<5;return(s>>>0)/4294967296;}
  function pick(arr){return arr[Math.floor(rng()*arr.length)];}
  function ri(n){return Math.floor(rng()*n);}

  const sk = pick(SKINS).s;
  const hr = pick(HAIRS).h;
  const ep = pick(EYES_PAL);
  const sp = pick(SHIRTS_PAL).c;
  const outfit = pick(OUTFITS);
  const acc = pick(ACC);
  const hairIdx = ri(10);
  const hasBlush = rng() > 0.25;
  const hasFringe = rng() > 0.2;
  const lipShade = rng() > 0.5 ? '#b04858' : '#a04048';
  const lipHi = rng() > 0.5 ? '#c86068' : '#b85058';
  const H = hr;

  // SDV style: crisp flat color blocks, minimal gradients, clean pixel edges
  // Face fills most of the 64x64 frame

  // -- BG --
  rect(ctx,0,0,64,64,'#1a0e2e');

  // -- BODY (y:48-63, wide shoulders) --
  // SDV bodies are wide, fill bottom of frame
  rect(ctx,4,52,56,12,sp[2]);
  rect(ctx,8,50,48,14,sp[2]);
  rect(ctx,14,48,36,4,sp[2]);
  // Right shoulder highlight
  rect(ctx,36,50,18,8,sp[3]);
  rect(ctx,42,52,12,6,sp[4]);
  // Left shadow
  rect(ctx,4,54,10,8,sp[1]);

  if(outfit==='dress'){
    rect(ctx,24,48,16,3,sk[3]);rect(ctx,26,48,12,2,sk[4]);
    for(let i=0;i<3;i++) rect(ctx,26-i*2,49+i,4+i*4,1,sk[3]);
    rect(ctx,16,56,32,1,sp[1]);
  } else if(outfit==='overalls'){
    rect(ctx,22,48,20,3,sp[3]);
    rect(ctx,20,51,24,12,'#5070a0');rect(ctx,22,52,20,2,'#6080b0');
    rect(ctx,24,49,4,4,'#5070a0');rect(ctx,36,49,4,4,'#5070a0');
    px(ctx,24,52,'#ffd700');px(ctx,39,52,'#ffd700');
    rect(ctx,28,55,8,4,'#406090');
  } else if(outfit==='hoodie'){
    rect(ctx,24,48,16,3,sp[1]);
    rect(ctx,22,49,4,3,sp[1]);rect(ctx,38,49,4,3,sp[1]);
    rect(ctx,20,54,24,4,sp[1]);rect(ctx,22,55,20,2,sp[2]);
    px(ctx,29,51,sp[4]);px(ctx,35,51,sp[4]);
  } else if(outfit==='blouse'){
    rect(ctx,24,48,16,3,sk[3]);
    rect(ctx,20,49,6,3,sp[4]);rect(ctx,38,49,6,3,sp[4]);
    for(let i=0;i<3;i++) px(ctx,32,52+i*2,sp[0]);
  } else if(outfit==='collar'){
    rect(ctx,26,48,12,2,sk[3]);
    rect(ctx,20,49,6,3,sp[4]);rect(ctx,38,49,6,3,sp[4]);
    rect(ctx,22,50,3,2,sp[5]);rect(ctx,39,50,3,2,sp[5]);
  } else {
    rect(ctx,24,48,16,3,sk[3]);rect(ctx,26,48,12,2,sk[4]);
  }

  // -- NECK --
  rect(ctx,27,44,10,6,sk[3]);
  rect(ctx,29,44,6,4,sk[4]);
  rect(ctx,27,45,2,3,sk[2]);
  rect(ctx,35,45,2,3,sk[4]);

  // -- HEAD -- SDV: clean oval, crisp edges, flat color zones
  // Face shape: wide oval, ~30px wide, ~32px tall, centered
  // Bottom rows (jaw): narrowing
  rect(ctx,17,10,30,28,sk[3]); // main face block
  rect(ctx,15,14,34,20,sk[3]); // wider cheeks
  rect(ctx,14,16,36,16,sk[3]); // widest point
  // Round top
  rect(ctx,19,8,26,4,sk[3]);
  rect(ctx,22,6,20,4,sk[3]);
  // Narrow jaw
  rect(ctx,19,36,26,4,sk[3]);
  rect(ctx,22,38,20,3,sk[3]);
  rect(ctx,25,40,14,3,sk[3]);
  rect(ctx,28,42,8,2,sk[3]);

  // SDV shading: flat blocks, not gradients
  // Right side highlight (top-right light)
  rect(ctx,34,12,12,18,sk[4]);
  rect(ctx,38,16,8,10,sk[5]);
  // Forehead highlight
  rect(ctx,26,8,14,6,sk[4]);
  rect(ctx,30,6,8,4,sk[5]);
  // Left cheek shadow
  rect(ctx,14,18,6,12,sk[2]);
  rect(ctx,16,16,4,14,sk[2]);
  // Jaw shadow
  rect(ctx,18,34,28,3,sk[2]);
  rect(ctx,22,36,20,2,sk[2]);

  // -- EARS (small, crisp) --
  rect(ctx,13,20,2,6,sk[3]);rect(ctx,13,21,1,4,sk[2]);
  rect(ctx,49,20,2,6,sk[4]);rect(ctx,50,21,1,4,sk[3]);

  // -- EYES -- SDV eyes: small! ~5px wide, 3px tall, almond shape
  // Positioned at ~1/3 down the face
  const ey=21, lex=22, rex=36;

  // Upper lid (dark line, defines eye shape - this is key to SDV look)
  rect(ctx,lex,ey,5,1,'#1c1410');
  rect(ctx,rex,ey,5,1,'#1c1410');
  // Outer corner flick (lash)
  px(ctx,lex-1,ey,'#1c1410');px(ctx,rex+5,ey,'#1c1410');
  px(ctx,lex-1,ey-1,'#1c1410');px(ctx,rex+5,ey-1,'#1c1410');

  // White of eye
  rect(ctx,lex,ey+1,5,2,'#f0ece8');
  rect(ctx,rex,ey+1,5,2,'#f0ece8');

  // Iris (just 3x2!)
  rect(ctx,lex+1,ey+1,3,2,ep[2]);
  rect(ctx,rex+1,ey+1,3,2,ep[2]);
  // Darker top of iris
  rect(ctx,lex+1,ey+1,3,1,ep[1]);
  rect(ctx,rex+1,ey+1,3,1,ep[1]);

  // Pupil (1-2px)
  px(ctx,lex+2,ey+1,ep[0]);px(ctx,lex+2,ey+2,ep[0]);
  px(ctx,rex+2,ey+1,ep[0]);px(ctx,rex+2,ey+2,ep[0]);

  // Sparkle (single white pixel - THE sdv signature)
  px(ctx,lex+3,ey+1,'#fff');
  px(ctx,rex+3,ey+1,'#fff');

  // Lower lid (subtle, just skin shadow)
  rect(ctx,lex,ey+3,5,1,sk[2]);
  rect(ctx,rex,ey+3,5,1,sk[2]);

  // -- EYEBROWS (simple 2px thick bar) --
  rect(ctx,lex-1,ey-3,6,1,H[1]);rect(ctx,lex,ey-2,5,1,H[1]);
  rect(ctx,rex,ey-3,6,1,H[1]);rect(ctx,rex,ey-2,5,1,H[1]);

  // -- NOSE (minimal! SDV noses are 2-3 pixels) --
  px(ctx,32,28,sk[2]);
  px(ctx,31,29,sk[2]);px(ctx,32,29,sk[1]);

  // -- MOUTH (small, ~6px wide) --
  rect(ctx,28,33,8,1,lipShade);
  rect(ctx,29,34,6,1,lipHi);
  px(ctx,27,33,sk[2]); // corner shadow

  // -- BLUSH --
  if(hasBlush){
    ctx.globalAlpha=0.25;
    rect(ctx,16,28,5,3,'#e08888');
    rect(ctx,42,27,5,3,'#e08888');
    ctx.globalAlpha=1;
  }

  // -- HAIR -- SDV: big clean shapes, 3-4 colors, crisp edges
  // Top of head base
  rect(ctx,16,2,32,10,H[2]);
  rect(ctx,19,0,26,6,H[2]);
  rect(ctx,22,-1,20,4,H[2]);
  // Crown highlight
  rect(ctx,28,0,12,4,H[3]);rect(ctx,32,0,8,2,H[4]);
  // Sides base
  rect(ctx,13,8,4,16,H[2]);rect(ctx,47,8,4,16,H[2]);
  rect(ctx,14,10,3,12,H[3]);

  switch(hairIdx%10){
    case 0: // Long straight (Haley)
      rect(ctx,9,12,5,42,H[2]);rect(ctx,50,12,5,42,H[2]);
      rect(ctx,7,20,4,36,H[1]);rect(ctx,53,20,4,36,H[1]);
      rect(ctx,10,14,3,36,H[3]);rect(ctx,51,14,3,30,H[3]);
      rect(ctx,11,16,2,28,H[4]);
      if(hasFringe){rect(ctx,18,6,14,8,H[2]);rect(ctx,20,7,8,5,H[3]);}
      break;
    case 1: // Bob (Penny)
      rect(ctx,10,12,5,22,H[2]);rect(ctx,49,12,5,22,H[2]);
      rect(ctx,8,18,4,14,H[1]);rect(ctx,52,18,4,14,H[1]);
      rect(ctx,11,14,3,18,H[3]);rect(ctx,50,14,3,14,H[4]);
      // Full bangs
      rect(ctx,16,4,32,10,H[2]);rect(ctx,18,5,26,7,H[3]);rect(ctx,22,5,12,4,H[4]);
      break;
    case 2: // Ponytail side (Abigail)
      rect(ctx,48,2,8,8,H[2]);rect(ctx,54,6,6,8,H[2]);
      rect(ctx,56,12,5,28,H[2]);rect(ctx,57,16,4,22,H[3]);rect(ctx,58,20,2,14,H[4]);
      rect(ctx,52,6,4,4,'#d84048');
      if(hasFringe){rect(ctx,16,5,18,9,H[2]);rect(ctx,18,6,12,5,H[3]);}
      break;
    case 3: // Pigtails
      rect(ctx,4,14,6,36,H[2]);rect(ctx,54,14,6,36,H[2]);
      rect(ctx,2,20,5,28,H[1]);rect(ctx,57,20,5,28,H[1]);
      rect(ctx,5,16,3,30,H[3]);rect(ctx,55,16,3,26,H[4]);
      rect(ctx,5,12,4,3,'#ff70a8');rect(ctx,55,12,4,3,'#ff70a8');
      rect(ctx,16,4,30,9,H[2]);rect(ctx,20,5,10,6,H[3]);rect(ctx,34,5,8,6,H[3]);
      rect(ctx,29,5,6,6,sk[3]);
      break;
    case 4: // Pixie short
      rect(ctx,14,0,34,12,H[2]);rect(ctx,18,-2,24,6,H[2]);
      rect(ctx,22,-3,16,4,H[3]);rect(ctx,28,-2,10,2,H[4]);
      rect(ctx,12,6,4,10,H[2]);rect(ctx,48,6,4,8,H[3]);
      break;
    case 5: // Curly volume
      rect(ctx,8,4,48,14,H[2]);rect(ctx,6,10,52,12,H[2]);
      rect(ctx,6,18,6,26,H[2]);rect(ctx,52,18,6,26,H[2]);
      rect(ctx,4,22,5,18,H[1]);rect(ctx,55,22,5,18,H[1]);
      rect(ctx,7,20,4,20,H[3]);rect(ctx,53,20,4,16,H[4]);
      // Curl bumps
      for(let i=0;i<4;i++){rect(ctx,4,24+i*6,3,3,H[3]);rect(ctx,57,22+i*6,3,3,H[3]);}
      rect(ctx,14,2,30,8,H[3]);rect(ctx,20,0,18,5,H[4]);
      break;
    case 6: // Bun updo
      rect(ctx,24,-6,16,10,H[2]);rect(ctx,22,-4,20,8,H[2]);
      rect(ctx,26,-5,12,4,H[3]);rect(ctx,28,-4,8,2,H[4]);
      rect(ctx,38,-2,3,3,'#ffd700');
      rect(ctx,14,10,3,12,H[2]);rect(ctx,47,10,3,12,H[2]);
      if(hasFringe){rect(ctx,17,5,16,8,H[2]);rect(ctx,19,6,10,5,H[3]);}
      break;
    case 7: // Side swept
      rect(ctx,6,6,10,30,H[2]);rect(ctx,4,12,8,22,H[1]);
      rect(ctx,7,8,6,24,H[3]);rect(ctx,8,10,4,16,H[4]);
      rect(ctx,14,4,24,10,H[2]);rect(ctx,16,5,16,7,H[3]);
      rect(ctx,47,8,4,14,H[2]);
      break;
    case 8: // Braids
      for(let i=0;i<8;i++){
        rect(ctx,6,14+i*5,4,3,(i%2)?H[3]:H[2]);
        rect(ctx,54,14+i*5,4,3,(i%2)?H[2]:H[3]);
      }
      rect(ctx,7,52,3,3,'#ffd700');rect(ctx,54,52,3,3,'#ffd700');
      rect(ctx,16,4,30,10,H[2]);rect(ctx,20,5,12,7,H[3]);rect(ctx,34,5,10,7,H[3]);
      rect(ctx,30,5,4,7,sk[3]);
      break;
    case 9: // Messy spiky
      rect(ctx,12,-2,38,14,H[2]);
      for(let i=0;i<6;i++){
        const sx=14+i*6+ri(3),sh=4+ri(5);
        rect(ctx,sx,-2-sh,4,sh+2,H[2+ri(2)]);
        rect(ctx,sx+1,-1-sh,2,sh,H[3+ri(2)]);
      }
      rect(ctx,10,8,5,14,H[2]);rect(ctx,49,8,5,12,H[2]);
      rect(ctx,16,6,24,8,H[2]);
      for(let i=0;i<4;i++) rect(ctx,17+i*6+ri(2),8+ri(3),4,5+ri(3),H[2+ri(2)]);
      break;
  }

  // -- ACCESSORIES --
  switch(acc){
    case 'bow':
      rect(ctx,38,0,5,4,'#ff4080');rect(ctx,43,0,5,4,'#ff4080');
      rect(ctx,42,0,3,3,'#d03060');px(ctx,43,1,'#ff60a0');
      break;
    case 'flower_crown':
      for(let i=0;i<4;i++){
        const fx=16+i*9,fy=3;

    case 'headband':
      rect(ctx,14,7,36,3,sp[3]);rect(ctx,16,7,32,1,sp[4]);rect(ctx,14,9,36,1,sp[1]);
      break;
    case 'earrings':
      rect(ctx,12,26,2,4,'#ffd700');rect(ctx,50,26,2,4,'#ffd700');
      px(ctx,12,29,'#60c8ff');px(ctx,51,29,'#60c8ff');
      break;
    case 'necklace':
      rect(ctx,26,47,12,1,'#ffd700');rect(ctx,29,48,6,1,'#ffd700');
      px(ctx,31,49,'#60d0ff');px(ctx,32,49,'#60d0ff');
      break;
    case 'glasses':
      // Square-ish SDV glasses (pixel perfect)
      rect(ctx,20,20,8,5,'#483828');rect(ctx,21,21,6,3,'#c8e0f0');
      rect(ctx,36,20,8,5,'#483828');rect(ctx,37,21,6,3,'#c8e0f0');
      rect(ctx,28,21,8,1,'#483828');
      px(ctx,14,21,'#483828');px(ctx,49,21,'#483828');
      break;
    case 'hat':
      rect(ctx,6,2,52,4,sp[3]);rect(ctx,8,1,48,2,sp[4]);
      rect(ctx,14,-4,36,8,sp[3]);rect(ctx,16,-3,32,4,sp[4]);rect(ctx,20,-2,24,2,sp[5]);
      rect(ctx,14,3,36,2,sp[1]);
      break;
    case 'bandana':
      rect(ctx,14,6,36,3,sp[3]);rect(ctx,16,6,32,1,sp[4]);rect(ctx,14,8,36,1,sp[1]);
      rect(ctx,48,8,4,3,sp[3]);rect(ctx,50,10,3,4,sp[2]);
      break;
  }

  return c.toDataURL();
}

function selectAvatar(id) {

  const img = new Image();
  img.onload = () => {
    pctx.clearRect(0, 0, 64, 64);

  img.src = avatarDataUrls[id];
}

const wheelCanvas = document.getElementById('wheel');
const wctx = wheelCanvas.getContext('2d');
let currentAngle = 0;
let spinning = false;

function drawWheel(angle, drawNames) {
  const wheelNames = drawNames || names;
  const segments = wheelNames.length;
  wctx.clearRect(0, 0, 400, 400);

  if (segments === 0) {
    wctx.save();
    wctx.translate(200, 200);
    const emptyGrad = wctx.createRadialGradient(0, 0, 30, 0, 0, 190);
    emptyGrad.addColorStop(0, '#3a2060');
    emptyGrad.addColorStop(1, '#2a1545');
    wctx.beginPath();
    wctx.arc(0, 0, 190, 0, 2 * Math.PI);
    wctx.fillStyle = emptyGrad;
    wctx.fill();
    wctx.strokeStyle = '#ffd700';
    wctx.lineWidth = 2;
    wctx.stroke();
    wctx.fillStyle = '#ffb6c1';
    wctx.font = '12px "Press Start 2P"';
    wctx.textAlign = 'center';
    wctx.fillText('Waiting for', 0, -10);
    wctx.fillText('players...', 0, 15);
    wctx.restore();
    return;
  }

  const segAngle = (2 * Math.PI) / segments;

  wctx.save();
  wctx.translate(200, 200);
  wctx.rotate(angle);

  const maxLen = Math.max(...wheelNames.map(n => n.length));
  let fontSize = 15;
  if (segments > 8 || maxLen > 10) fontSize = 12;
  if (segments > 12 || maxLen > 14) fontSize = 10;

  for (let i = 0; i < segments; i++) {
    const startAngle = i * segAngle;
    const endAngle = startAngle + segAngle;
    const colors = allColors[i % allColors.length];

    const grad = wctx.createRadialGradient(0, 0, 30, 0, 0, 190);
    grad.addColorStop(0, colors[1]);
    grad.addColorStop(1, colors[0]);

    wctx.beginPath();
    wctx.moveTo(0, 0);
    wctx.arc(0, 0, 190, startAngle, endAngle);
    wctx.closePath();
    wctx.fillStyle = grad;
    wctx.fill();

    wctx.strokeStyle = '#ffd700';
    wctx.lineWidth = 2;
    wctx.stroke();

    wctx.save();
    wctx.rotate(startAngle + segAngle / 2);
    wctx.textAlign = 'center';
    wctx.fillStyle = '#2c1810';
    wctx.font = `600 ${fontSize}px "Press Start 2P"`;
    wctx.fillText(wheelNames[i], 110, 5);

    wctx.font = '18px serif';
    wctx.fillText(allEmojis[i % allEmojis.length], 170, 5);
    wctx.restore();
  }

  const centerGrad = wctx.createRadialGradient(0, 0, 5, 0, 0, 28);
  centerGrad.addColorStop(0, '#fff');
  centerGrad.addColorStop(1, '#ffd700');
  wctx.beginPath();
  wctx.arc(0, 0, 28, 0, 2 * Math.PI);
  wctx.fillStyle = centerGrad;
  wctx.fill();
  wctx.strokeStyle = '#8b4513';
  wctx.lineWidth = 3;
  wctx.stroke();

  wctx.font = '20px serif';
  wctx.fillStyle = '#ff69b4';
  wctx.textAlign = 'center';
  wctx.fillText('\u2605', 0, 7);

  wctx.restore();
}

drawWheel(0);

// ========================================
// AUDIO
// ========================================
let audioCtx = null;
let musicPlaying = false;
let musicInterval = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playNote(freq, startTime, duration, type = 'square', vol = 0.08) {
  const ac = getAudioCtx();
  const osc = ac.createOscillator();
  const gain = ac.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, startTime);
  gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
  osc.connect(gain);
  gain.connect(ac.destination);
  osc.start(startTime);
  osc.stop(startTime + duration);
}

const melody = [
  392, 440, 494, 523, 494, 440, 392, 330,
  294, 330, 392, 440, 392, 330, 294, 262,
  330, 392, 440, 523, 587, 523, 440, 392,
  440, 392, 330, 294, 330, 392, 440, 392,
];

const bassLine = [
  262, 262, 330, 330, 294, 294, 262, 262,
  220, 220, 262, 262, 247, 247, 220, 220,
  262, 262, 330, 330, 349, 349, 330, 330,
  294, 294, 262, 262, 247, 247, 262, 262,
];

function playMusic() {
  const ac = getAudioCtx();
  const noteLen = 0.22;

  function scheduleLoop() {
    const loopStart = ac.currentTime + 0.05;
    for (let i = 0; i < melody.length; i++) {
      const t = loopStart + i * noteLen;
      playNote(melody[i], t, noteLen * 0.9, 'square', 0.06);
      if (i % 2 === 0) playNote(bassLine[i], t, noteLen * 1.8, 'triangle', 0.07);
      if (i % 8 === 0) playNote(melody[i] * 2, t, noteLen * 0.3, 'sine', 0.03);
    }
    return melody.length * noteLen * 1000;
  }

  const dur = scheduleLoop();
  musicInterval = setInterval(scheduleLoop, dur);
}

function stopMusic() {
  if (musicInterval) { clearInterval(musicInterval); musicInterval = null; }
}

function toggleMusic() {
  const btn = document.getElementById('musicBtn');
  if (!musicPlaying) {
    playMusic();
    btn.textContent = 'Music: ON';
    musicPlaying = true;
  } else {
    stopMusic();
    btn.textContent = 'Music: OFF';
    musicPlaying = false;
  }
}

function playSpinTick(progress) {
  const ac = getAudioCtx();
  const pitch = 400 + (1 - progress) * 600;
  const vol = 0.04 + progress * 0.08;
  const len = 0.03 + progress * 0.12;
  playNote(pitch, ac.currentTime, len, 'square', vol);
  if (progress > 0.7) {
    playNote(pitch * 0.5, ac.currentTime, len * 1.5, 'triangle', vol * 0.5);
  }
}

function playWinSound() {
  const ac = getAudioCtx();
  const t = ac.currentTime;
  playNote(523, t, 0.15, 'square', 0.1);
  playNote(659, t + 0.15, 0.15, 'square', 0.1);
  playNote(784, t + 0.3, 0.15, 'square', 0.1);
  playNote(1047, t + 0.45, 0.4, 'square', 0.12);
  playNote(1568, t + 0.5, 0.3, 'sine', 0.06);
  playNote(2093, t + 0.6, 0.4, 'sine', 0.04);
}

// ========================================
// SYNCED SPIN
// ========================================
function doSpin(extraRotations, randomSegment, duration, spinNames) {
  if (spinning) return;
  if (!spinNames || spinNames.length === 0) return;
  spinning = true;
  document.getElementById('spinBtn').disabled = true;

  getAudioCtx();

  const segments = spinNames.length;
  const segAngle = (2 * Math.PI) / segments;

  const targetAngle = currentAngle + extraRotations + randomSegment;
  const startAngle = currentAngle;
  const totalAngle = targetAngle - startAngle;
  const startTime = performance.now();
  let lastTickAngle = startAngle;

  function animate(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / duration, 1);

    let eased;
    if (progress < 0.3) {
      eased = 0.7 * (progress / 0.3);
    } else {
      const slowProgress = (progress - 0.3) / 0.7;
      eased = 0.7 + 0.3 * (1 - Math.pow(1 - slowProgress, 5));
    }

    const angle = startAngle + totalAngle * eased;
    drawWheel(angle, spinNames);

    const segsPassed = Math.floor(angle / segAngle);
    const lastSegs = Math.floor(lastTickAngle / segAngle);
    if (segsPassed !== lastSegs && progress < 0.98) playSpinTick(progress);
    lastTickAngle = angle;

    if (progress < 1) {
      requestAnimationFrame(animate);
    } else {
      currentAngle = angle % (2 * Math.PI);
      const normalizedAngle = (2 * Math.PI - currentAngle % (2 * Math.PI)) % (2 * Math.PI);
      const winnerIndex = Math.floor(normalizedAngle / segAngle) % segments;

      setTimeout(() => {
        showWinner(spinNames[winnerIndex]);
        spinning = false;
        document.getElementById('spinBtn').disabled = false;
      }, 1200);
    }
  }

  requestAnimationFrame(animate);
}

// ========================================
// WINNER DISPLAY
// ========================================
function showWinner(name) {
  playWinSound();
  const overlay = document.getElementById('winnerOverlay');
  document.getElementById('winnerName').textContent = name;
  overlay.classList.add('show');

  const sparklesEl = document.getElementById('winnerSparkles');
  sparklesEl.innerHTML = '';
  const celebChars = ['\u2728', '\u2B50', '\uD83D\uDC96', '\uD83C\uDF1F', '\uD83C\uDF89', '\uD83D\uDCAB', '\uD83C\uDF38', '\uD83C\uDF80', '\uD83D\uDC9C', '\u273F'];
  for (let i = 0; i < 30; i++) {
    const sp = document.createElement('div');
    sp.className = 'sparkle';
    sp.textContent = celebChars[i % celebChars.length];
    sp.style.cssText = `
      left: ${Math.random() * 100}%;
      top: ${Math.random() * 100}%;
      --dur: ${Math.random() * 2 + 1.5}s;
      animation-delay: ${Math.random() * 2}s;
    `;
    sparklesEl.appendChild(sp);
  }
}

function closeOverlay() {
  document.getElementById('winnerOverlay').classList.remove('show');
}
