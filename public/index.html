<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prize Spinner!</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<script src="/socket.io/socket.io.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a0e2e;
    font-family: 'Press Start 2P', cursive;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
    image-rendering: pixelated;
  }

  .stars-container {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 0;
  }

  .star {
    position: absolute;
    background: #fff;
    border-radius: 50%;
    animation: twinkle var(--dur) ease-in-out infinite;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.2; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.5); }
  }

  .flower {
    position: fixed;
    font-size: 24px;
    animation: floatUp var(--dur) linear infinite;
    opacity: 0.7;
    z-index: 0;
    pointer-events: none;
  }

  @keyframes floatUp {
    0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
    10% { opacity: 0.7; }
    90% { opacity: 0.7; }
    100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
  }

  .firefly {
    position: fixed;
    width: 6px;
    height: 6px;
    background: #ffe066;
    border-radius: 50%;
    box-shadow: 0 0 8px 4px rgba(255, 224, 102, 0.6);
    animation: fireflyMove var(--dur) ease-in-out infinite;
    z-index: 1;
    pointer-events: none;
  }

  @keyframes fireflyMove {
    0% { transform: translate(0, 0); opacity: 0; }
    15% { opacity: 1; }
    50% { transform: translate(var(--dx), var(--dy)); opacity: 0.6; }
    85% { opacity: 1; }
    100% { transform: translate(var(--dx2), var(--dy2)); opacity: 0; }
  }

  .title {
    color: #ffd700;
    font-size: 28px;
    text-shadow: 3px 3px 0 #8b4513, -1px -1px 0 #ff69b4;
    margin-bottom: 20px;
    z-index: 10;
    text-align: center;
    line-height: 1.6;
    animation: titleBounce 2s ease-in-out infinite;
  }

  @keyframes titleBounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-5px); }
  }

  .spinner-wrapper {
    position: relative;
    z-index: 10;
  }

  .arrow {
    position: absolute;
    top: 50%;
    right: -30px;
    transform: translateY(-50%);
    width: 0;
    height: 0;
    border-top: 20px solid transparent;
    border-bottom: 20px solid transparent;
    border-right: 35px solid #ffd700;
    filter: drop-shadow(0 0 6px rgba(255, 215, 0, 0.8));
    z-index: 20;
  }

  canvas#wheel {
    border-radius: 50%;
    box-shadow:
      0 0 30px rgba(255, 182, 193, 0.5),
      0 0 60px rgba(147, 112, 219, 0.3),
      inset 0 0 30px rgba(255, 255, 255, 0.1);
    cursor: pointer;
    transition: box-shadow 0.3s;
  }

  canvas#wheel:hover {
    box-shadow:
      0 0 40px rgba(255, 182, 193, 0.7),
      0 0 80px rgba(147, 112, 219, 0.5),
      inset 0 0 30px rgba(255, 255, 255, 0.2);
  }

  .spin-btn {
    margin-top: 25px;
    padding: 15px 40px;
    font-family: 'Press Start 2P', cursive;
    font-size: 16px;
    background: linear-gradient(180deg, #ff9a9e, #e8637a);
    color: #fff;
    border: 4px solid #ffd700;
    border-radius: 12px;
    cursor: pointer;
    z-index: 10;
    text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
    box-shadow: 0 6px 0 #b8445a, 0 8px 20px rgba(0,0,0,0.3);
    transition: all 0.1s;
    position: relative;
  }

  .spin-btn:hover {
    background: linear-gradient(180deg, #ffb3b7, #ff7b93);
    transform: translateY(-2px);
    box-shadow: 0 8px 0 #b8445a, 0 10px 25px rgba(0,0,0,0.3);
  }

  .spin-btn:active {
    transform: translateY(4px);
    box-shadow: 0 2px 0 #b8445a, 0 3px 10px rgba(0,0,0,0.3);
  }

  .spin-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
  }

  .winner-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(26, 14, 46, 0.92);
    z-index: 100;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    animation: fadeIn 0.5s;
  }

  .winner-overlay.show { display: flex; }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .winner-text {
    font-size: 18px;
    color: #ffb6c1;
    margin-bottom: 15px;
    text-shadow: 2px 2px 0 #8b4513;
  }

  .winner-name {
    font-size: 42px;
    color: #ffd700;
    text-shadow: 3px 3px 0 #8b4513, 0 0 30px rgba(255, 215, 0, 0.6);
    animation: winnerPop 0.6s ease-out, winnerGlow 1.5s ease-in-out infinite 0.6s;
    margin-bottom: 20px;
  }

  @keyframes winnerPop {
    0% { transform: scale(0); opacity: 0; }
    60% { transform: scale(1.3); }
    100% { transform: scale(1); opacity: 1; }
  }

  @keyframes winnerGlow {
    0%, 100% { text-shadow: 3px 3px 0 #8b4513, 0 0 30px rgba(255, 215, 0, 0.6); }
    50% { text-shadow: 3px 3px 0 #8b4513, 0 0 60px rgba(255, 215, 0, 0.9), 0 0 90px rgba(255, 182, 193, 0.5); }
  }

  .winner-sparkles {
    position: absolute;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  .sparkle {
    position: absolute;
    font-size: 28px;
    animation: sparkleFloat var(--dur) linear infinite;
  }

  @keyframes sparkleFloat {
    0% { transform: translateY(0) rotate(0) scale(0); opacity: 0; }
    20% { opacity: 1; transform: scale(1); }
    80% { opacity: 1; }
    100% { transform: translateY(-200px) rotate(720deg) scale(0); opacity: 0; }
  }

  .close-btn {
    margin-top: 20px;
    padding: 12px 30px;
    font-family: 'Press Start 2P', cursive;
    font-size: 12px;
    background: linear-gradient(180deg, #9b59b6, #7d3c98);
    color: #fff;
    border: 3px solid #ffd700;
    border-radius: 10px;
    cursor: pointer;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
    box-shadow: 0 4px 0 #5b2c6f;
    transition: all 0.1s;
  }

  .close-btn:hover {
    background: linear-gradient(180deg, #af7ac5, #9b59b6);
    transform: translateY(-2px);
  }

  .close-btn:active {
    transform: translateY(2px);
    box-shadow: 0 2px 0 #5b2c6f;
  }

  .grass {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 40px;
    background:
      repeating-linear-gradient(90deg,
        #3a7d44 0px, #3a7d44 8px,
        #2d6b35 8px, #2d6b35 16px,
        #4a9d54 16px, #4a9d54 24px,
        #2d6b35 24px, #2d6b35 32px);
    z-index: 5;
    image-rendering: pixelated;
  }

  .grass::before {
    content: '';
    position: absolute;
    top: -12px;
    left: 0;
    right: 0;
    height: 12px;
    background:
      repeating-linear-gradient(90deg,
        transparent 0px, transparent 4px,
        #3a7d44 4px, #3a7d44 8px,
        transparent 8px, transparent 16px,
        #4a9d54 16px, #4a9d54 20px,
        transparent 20px, transparent 28px,
        #2d6b35 28px, #2d6b35 32px);
  }

  .music-btn {
    position: fixed;
    top: 15px;
    right: 15px;
    padding: 8px 12px;
    font-family: 'Press Start 2P', cursive;
    font-size: 10px;
    background: rgba(147, 112, 219, 0.5);
    color: #ffd700;
    border: 2px solid #ffd700;
    border-radius: 8px;
    cursor: pointer;
    z-index: 50;
  }

  .viewer-panel {
    position: fixed;
    top: 12px;
    left: 12px;
    padding: 10px 14px;
    font-family: 'Press Start 2P', cursive;
    font-size: 8px;
    color: #84fab0;
    z-index: 50;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.5);
    background: rgba(26, 14, 46, 0.75);
    border: 2px solid rgba(132, 250, 176, 0.3);
    border-radius: 10px;
    max-width: 240px;
  }

  .viewer-panel .panel-title {
    color: #ffd700;
    font-size: 9px;
    margin-bottom: 8px;
    text-shadow: 1px 1px 0 #8b4513;
  }

  .viewer-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }

  .viewer-list li {
    padding: 4px 0;
    color: #ffb6c1;
    font-size: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .viewer-list li img {
    width: 32px;
    height: 32px;
    image-rendering: pixelated;
    border: 1px solid rgba(255,215,0,0.4);
    border-radius: 3px;
    flex-shrink: 0;
    background: rgba(26, 14, 46, 0.5);
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .join-toast {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Press Start 2P', cursive;
    font-size: 14px;
    color: #84fab0;
    text-shadow: 2px 2px 0 #1a0e2e;
    z-index: 90;
    pointer-events: none;
    animation: toastPop 1.5s ease-out forwards;
    white-space: nowrap;
  }

  @keyframes toastPop {
    0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
    20% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
    40% { transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -80%) scale(1); }
  }

  /* Modals */
  .modal {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(26, 14, 46, 0.95);
    z-index: 200;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }

  .modal.hidden { display: none; }

  .modal h2 {
    color: #ffd700;
    font-family: 'Press Start 2P', cursive;
    font-size: 20px;
    text-shadow: 3px 3px 0 #8b4513;
    text-align: center;
    line-height: 1.8;
  }

  .modal p {
    color: #ffb6c1;
    font-family: 'Press Start 2P', cursive;
    font-size: 10px;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
  }

  .name-input {
    font-family: 'Press Start 2P', cursive;
    font-size: 16px;
    padding: 12px 20px;
    border: 3px solid #ffd700;
    border-radius: 10px;
    background: rgba(255, 255, 255, 0.1);
    color: #fff;
    text-align: center;
    outline: none;
    width: 280px;
    text-shadow: 1px 1px 0 rgba(0,0,0,0.3);
  }

  .name-input::placeholder {
    color: rgba(255, 182, 193, 0.5);
    font-size: 11px;
  }

  .name-input:focus {
    border-color: #ff69b4;
    box-shadow: 0 0 20px rgba(255, 105, 180, 0.4);
  }

  .modal-btn {
    padding: 12px 35px;
    font-family: 'Press Start 2P', cursive;
    font-size: 14px;
    background: linear-gradient(180deg, #84fab0, #5bc990);
    color: #1a0e2e;
    border: 3px solid #ffd700;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 5px 0 #3a9d6a, 0 7px 15px rgba(0,0,0,0.3);
    transition: all 0.1s;
  }

  .modal-btn:hover {
    background: linear-gradient(180deg, #a0ffc8, #84fab0);
    transform: translateY(-2px);
    box-shadow: 0 7px 0 #3a9d6a, 0 9px 20px rgba(0,0,0,0.3);
  }

  .modal-btn:active {
    transform: translateY(3px);
    box-shadow: 0 2px 0 #3a9d6a;
  }

  /* Avatar grid */
  .avatar-grid {
    display: grid;
    grid-template-columns: repeat(5, 80px);
    gap: 10px;
    max-height: 380px;
    overflow-y: auto;
    padding: 10px;
  }

  .avatar-option {
    width: 80px;
    height: 80px;
    border: 3px solid rgba(255, 215, 0, 0.3);
    border-radius: 8px;
    cursor: pointer;
    background: rgba(255, 255, 255, 0.05);
    padding: 4px;
    transition: all 0.15s;
    image-rendering: pixelated;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .avatar-option:hover {
    border-color: #ff69b4;
    transform: scale(1.1);
    background: rgba(255, 105, 180, 0.15);
  }

  .avatar-option.selected {
    border-color: #ffd700;
    background: rgba(255, 215, 0, 0.2);
    box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
    transform: scale(1.1);
  }

  .avatar-option img {
    width: 100%;
    height: 100%;
    image-rendering: pixelated;
  }

  .selected-preview {
    width: 96px;
    height: 96px;
    image-rendering: pixelated;
    border: 3px solid #ffd700;
    border-radius: 10px;
    background: rgba(255, 255, 255, 0.05);
  }
</style>
</head>
<body>

<div class="stars-container" id="stars"></div>
<div id="flowers"></div>
<div id="fireflies"></div>

<!-- Step 1: Name entry -->
<div class="modal" id="nameModal">
  <h2>Prize Drawing!</h2>
  <p>Enter your name to join</p>
  <input type="text" class="name-input" id="nameInput" placeholder="Your name..." maxlength="20" autocomplete="off">
  <button class="modal-btn" onclick="goToAvatarSelect()">NEXT</button>
</div>

<!-- Step 2: Avatar selection -->
<div class="modal hidden" id="avatarModal">
  <h2>Choose Your Avatar!</h2>
  <canvas class="selected-preview" id="avatarPreview" width="48" height="48"></canvas>
  <div class="avatar-grid" id="avatarGrid"></div>
  <button class="modal-btn" onclick="joinRoom()">JOIN</button>
</div>

<div class="viewer-panel" id="viewerPanel">
  <div class="panel-title">Who's Here:</div>
  <ul class="viewer-list" id="viewerList"></ul>
</div>

<div class="title">Prize Drawing!</div>

<div class="spinner-wrapper">
  <div class="arrow"></div>
  <canvas id="wheel" width="400" height="400"></canvas>
</div>

<button class="spin-btn" id="spinBtn" onclick="requestSpin()">SPIN!</button>

<div class="winner-overlay" id="winnerOverlay">
  <div class="winner-sparkles" id="winnerSparkles"></div>
  <div class="winner-text">The winner is...</div>
  <div class="winner-name" id="winnerName"></div>
  <button class="close-btn" onclick="closeOverlay()">Spin Again!</button>
</div>

<div class="grass"></div>

<button class="music-btn" id="musicBtn" onclick="toggleMusic()">Music: OFF</button>

<script>
// ========================================
// STARDEW VALLEY STYLE AVATAR GENERATOR
// ========================================
const AV = 48; // avatar canvas size
const avatarDataUrls = [];

// Helpers
function hexToRgb(h){const r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);return[r,g,b];}
function rgbToHex(r,g,b){return '#'+[r,g,b].map(x=>Math.max(0,Math.min(255,Math.round(x))).toString(16).padStart(2,'0')).join('');}
function darken(hex,amt){const[r,g,b]=hexToRgb(hex);return rgbToHex(r*amt,g*amt,b*amt);}
function lighten(hex,amt){const[r,g,b]=hexToRgb(hex);return rgbToHex(r+(255-r)*amt,g+(255-g)*amt,b+(255-b)*amt);}

// Pixel drawing helper - draws a single "pixel" at grid position
function px(ctx,x,y,color){ctx.fillStyle=color;ctx.fillRect(x,y,1,1);}
// Draw a filled rect of pixels
function rect(ctx,x,y,w,h,color){ctx.fillStyle=color;ctx.fillRect(x,y,w,h);}

// Palette options
const SKINS = [
  {base:'#fce4c0',shadow:'#e8c89c',highlight:'#fff0dc',blush:'#f5a0a0'},
  {base:'#f5d0a0',shadow:'#dbb880',highlight:'#fce0b8',blush:'#e89090'},
  {base:'#e8b888',shadow:'#c89868',highlight:'#f0c8a0',blush:'#d88888'},
  {base:'#c89060',shadow:'#a87040',highlight:'#d8a878',blush:'#b87878'},
  {base:'#a07048',shadow:'#885830',highlight:'#b88860',blush:'#986868'},
  {base:'#784830',shadow:'#603820',highlight:'#906040',blush:'#785050'},
];

const HAIRS = [
  {base:'#2a1506',shadow:'#1a0c02',highlight:'#4a2810'},  // dark brown
  {base:'#6b3520',shadow:'#4a2010',highlight:'#8a4830'},  // auburn
  {base:'#c87030',shadow:'#a85818',highlight:'#e08848'},  // ginger
  {base:'#f0c830',shadow:'#d0a818',highlight:'#f8d858'},  // blonde
  {base:'#e84040',shadow:'#c02828',highlight:'#f06060'},  // red
  {base:'#ff70a8',shadow:'#d85090',highlight:'#ff90c0'},  // pink
  {base:'#8848b0',shadow:'#683090',highlight:'#a060c8'},  // purple
  {base:'#4080d0',shadow:'#2860a8',highlight:'#60a0e8'},  // blue
  {base:'#30b080',shadow:'#209060',highlight:'#50d0a0'},  // teal
  {base:'#181818',shadow:'#080808',highlight:'#383838'},  // black
];

const EYES = ['#2858a0','#28a048','#784818','#682888','#a03030','#186878','#505050'];

const SHIRTS = [
  {base:'#d84040',shadow:'#b02828',highlight:'#f06060',detail:'#c03030'},  // red
  {base:'#4088d0',shadow:'#2868a8',highlight:'#60a8f0',detail:'#3078c0'},  // blue
  {base:'#40b868',shadow:'#289848',highlight:'#60d888',detail:'#30a858'},  // green
  {base:'#d8a030',shadow:'#b88018',highlight:'#f0b848',detail:'#c89028'},  // gold
  {base:'#9050b8',shadow:'#703898',highlight:'#a868d0',detail:'#8040a8'},  // purple
  {base:'#e07890',shadow:'#c06078',highlight:'#f090a8',detail:'#d06880'},  // rose
  {base:'#40b0b8',shadow:'#209098',highlight:'#60d0d8',detail:'#30a0a8'},  // teal
  {base:'#e88040',shadow:'#c86828',highlight:'#f89858',detail:'#d87030'},  // orange
  {base:'#f0f0f0',shadow:'#c8c8c8',highlight:'#ffffff',detail:'#d8d8d8'},  // white
  {base:'#e0a0c0',shadow:'#c080a0',highlight:'#f0b8d0',detail:'#d090b0'},  // pastel pink
];

const OUTFITS = ['tee','blouse','overalls','dress','hoodie','vneck'];
const ACC = ['none','bow','flower_crown','headband','earrings','necklace','glasses','hat','bandana','scarf'];

function generateAvatar(seed) {
  const c = document.createElement('canvas');
  c.width = AV; c.height = AV;
  const ctx = c.getContext('2d');

  let s = (seed * 2654435761 + 137) >>> 0;
  function rng(){s^=s<<13;s^=s>>17;s^=s<<5;return(s>>>0)/4294967296;}
  function pick(arr){return arr[Math.floor(rng()*arr.length)];}

  const skin = pick(SKINS);
  const hair = pick(HAIRS);
  const eyeColor = pick(EYES);
  const shirt = pick(SHIRTS);
  const outfit = pick(OUTFITS);
  const acc = pick(ACC);
  const hairIdx = Math.floor(rng()*10);
  const hasBlush = rng() > 0.3;
  const hasFringe = rng() > 0.3;
  const lipColor = rng() > 0.5 ? '#c85060' : '#b84848';

  // BG - slight warm vignette like SDV portraits
  const bg = ctx.createRadialGradient(24,20,5,24,24,30);
  bg.addColorStop(0, 'rgba(60,40,80,0.3)');
  bg.addColorStop(1, 'rgba(20,10,35,0.6)');
  rect(ctx,0,0,48,48,'#1a0e2e');
  ctx.fillStyle = bg;
  ctx.fillRect(0,0,48,48);

  // --- BODY / SHOULDERS ---
  const bx=14, by=32; // body top-left
  if(outfit==='dress'){
    // Dress with puff shoulders
    rect(ctx,bx-2,by+2,24,14,shirt.base);
    rect(ctx,bx,by,20,14,shirt.base);
    rect(ctx,bx+1,by+1,18,2,shirt.highlight);
    rect(ctx,bx-2,by+2,4,5,shirt.base); // left shoulder puff
    rect(ctx,bx+18,by+2,4,5,shirt.base);
    rect(ctx,bx-1,by+3,3,3,shirt.highlight);
    rect(ctx,bx+18,by+3,3,3,shirt.highlight);
    // Neckline
    rect(ctx,bx+7,by,6,3,skin.base);
    rect(ctx,bx+8,by,4,2,skin.highlight);
    // Dress detail
    rect(ctx,bx+2,by+6,16,1,shirt.detail);
    rect(ctx,bx+8,by+3,4,1,shirt.shadow);
  } else if(outfit==='overalls'){
    // Undershirt
    rect(ctx,bx,by,20,14,shirt.base);
    rect(ctx,bx-2,by+2,24,12,shirt.base);
    rect(ctx,bx+1,by+1,18,2,shirt.highlight);
    // Overalls
    rect(ctx,bx+2,by+5,16,10,'#5878a8');
    rect(ctx,bx+3,by+5,14,1,'#6888b8');
    // Straps
    rect(ctx,bx+4,by+1,3,5,'#5878a8');
    rect(ctx,bx+13,by+1,3,5,'#5878a8');
    rect(ctx,bx+5,by+2,1,3,'#6888b8');
    rect(ctx,bx+14,by+2,1,3,'#6888b8');
    // Pocket
    rect(ctx,bx+7,by+8,6,4,'#486898');
    rect(ctx,bx+8,by+9,4,2,'#5878a8');
    // Neck
    rect(ctx,bx+7,by,6,2,skin.base);
  } else if(outfit==='hoodie'){
    rect(ctx,bx-2,by+1,24,14,shirt.base);
    rect(ctx,bx,by,20,14,shirt.base);
    rect(ctx,bx+1,by+1,18,3,shirt.highlight);
    // Hood lines
    rect(ctx,bx+7,by,6,3,skin.base);
    rect(ctx,bx+5,by,2,4,shirt.shadow);
    rect(ctx,bx+13,by,2,4,shirt.shadow);
    // Pocket
    rect(ctx,bx+5,by+8,10,4,shirt.shadow);
    rect(ctx,bx+6,by+9,8,2,shirt.base);
    // Drawstring
    px(ctx,bx+9,by+3,shirt.detail);
    px(ctx,bx+10,by+4,shirt.detail);
    px(ctx,bx+11,by+3,shirt.detail);
  } else if(outfit==='blouse'){
    rect(ctx,bx-1,by+1,22,14,shirt.base);
    rect(ctx,bx,by,20,14,shirt.base);
    // Rounded collar
    rect(ctx,bx+6,by,8,3,skin.base);
    rect(ctx,bx+5,by+1,2,2,shirt.highlight);
    rect(ctx,bx+13,by+1,2,2,shirt.highlight);
    // Buttons
    for(let i=0;i<3;i++) px(ctx,bx+10,by+4+i*2,shirt.detail);
    rect(ctx,bx+1,by+1,4,2,shirt.highlight);
    rect(ctx,bx+15,by+1,4,2,shirt.highlight);
    // Slight puff sleeve
    rect(ctx,bx-2,by+2,3,4,shirt.base);
    rect(ctx,bx+19,by+2,3,4,shirt.base);
  } else if(outfit==='vneck'){
    rect(ctx,bx-1,by+1,22,14,shirt.base);
    rect(ctx,bx,by,20,14,shirt.base);
    // V-neck
    rect(ctx,bx+7,by,6,2,skin.base);
    rect(ctx,bx+8,by+2,4,2,skin.base);
    rect(ctx,bx+9,by+4,2,1,skin.base);
    // V lines
    px(ctx,bx+7,by+2,shirt.shadow);
    px(ctx,bx+8,by+3,shirt.shadow);
    px(ctx,bx+12,by+2,shirt.shadow);
    px(ctx,bx+11,by+3,shirt.shadow);
    rect(ctx,bx+1,by+1,5,2,shirt.highlight);
    rect(ctx,bx+14,by+1,5,2,shirt.highlight);
  } else { // tee
    rect(ctx,bx-1,by+1,22,14,shirt.base);
    rect(ctx,bx,by,20,14,shirt.base);
    rect(ctx,bx+7,by,6,2,skin.base);
    rect(ctx,bx+1,by+1,5,2,shirt.highlight);
    rect(ctx,bx+14,by+1,5,2,shirt.highlight);
    // Sleeve lines
    rect(ctx,bx-1,by+5,2,1,shirt.shadow);
    rect(ctx,bx+19,by+5,2,1,shirt.shadow);
  }

  // --- NECK ---
  rect(ctx,19,29,10,5,skin.base);
  rect(ctx,20,29,8,4,skin.highlight);
  rect(ctx,19,32,2,2,skin.shadow);
  rect(ctx,27,32,2,2,skin.shadow);

  // --- HEAD ---
  const hx=12,hy=6;
  // Head shape - rounded
  rect(ctx,hx+2,hy,20,24,skin.base);
  rect(ctx,hx+1,hy+2,22,20,skin.base);
  rect(ctx,hx,hy+4,24,16,skin.base);
  // Highlights
  rect(ctx,hx+3,hy+1,18,4,skin.highlight);
  rect(ctx,hx+2,hy+3,6,8,skin.highlight);
  // Jaw shadow
  rect(ctx,hx+1,hy+20,22,2,skin.shadow);
  rect(ctx,hx+2,hy+22,20,2,skin.shadow);
  rect(ctx,hx+4,hy+24,16,1,skin.shadow);

  // --- EARS ---
  rect(ctx,hx-1,hy+10,2,5,skin.base);
  rect(ctx,hx+23,hy+10,2,5,skin.base);
  px(ctx,hx-1,hy+11,skin.shadow);
  px(ctx,hx+24,hy+11,skin.shadow);

  // --- EYES ---
  const ey=hy+11, lex=hx+4, rex=hx+14;
  // White
  rect(ctx,lex,ey,5,4,'#fff');
  rect(ctx,rex,ey,5,4,'#fff');
  // Eye outline (top)
  rect(ctx,lex,ey-1,5,1,'#2a1a10');
  rect(ctx,rex,ey-1,5,1,'#2a1a10');
  // Iris
  rect(ctx,lex+1,ey,3,4,eyeColor);
  rect(ctx,rex+1,ey,3,4,eyeColor);
  // Iris highlight
  rect(ctx,lex+1,ey,2,2,lighten(eyeColor,0.3));
  rect(ctx,rex+1,ey,2,2,lighten(eyeColor,0.3));
  // Pupil
  rect(ctx,lex+2,ey+1,2,2,'#101010');
  rect(ctx,rex+2,ey+1,2,2,'#101010');
  // Sparkle
  px(ctx,lex+1,ey,'#fff');
  px(ctx,rex+1,ey,'#fff');
  // Lower lid
  px(ctx,lex,ey+3,skin.shadow);
  px(ctx,lex+4,ey+3,skin.shadow);
  px(ctx,rex,ey+3,skin.shadow);
  px(ctx,rex+4,ey+3,skin.shadow);
  // Lashes
  px(ctx,lex-1,ey-1,'#2a1a10');
  px(ctx,lex+5,ey-1,'#2a1a10');
  px(ctx,rex-1,ey-1,'#2a1a10');
  px(ctx,rex+5,ey-1,'#2a1a10');
  // Eyebrows
  rect(ctx,lex,ey-3,5,1,darken(hair.base,0.7));
  rect(ctx,rex,ey-3,5,1,darken(hair.base,0.7));
  px(ctx,lex-1,ey-2,darken(hair.base,0.7));
  px(ctx,rex+5,ey-2,darken(hair.base,0.7));

  // --- NOSE ---
  px(ctx,hx+12,hy+16,skin.shadow);
  px(ctx,hx+11,hy+17,skin.shadow);
  px(ctx,hx+12,hy+17,darken(skin.base,0.85));

  // --- MOUTH ---
  rect(ctx,hx+8,hy+20,8,1,lipColor);
  rect(ctx,hx+9,hy+21,6,1,lighten(lipColor,0.15));
  px(ctx,hx+7,hy+20,darken(lipColor,0.8));
  px(ctx,hx+16,hy+20,darken(lipColor,0.8));
  // Smile highlight
  px(ctx,hx+10,hy+20,lighten(lipColor,0.2));
  px(ctx,hx+11,hy+20,lighten(lipColor,0.2));

  // --- BLUSH ---
  if(hasBlush){
    ctx.globalAlpha=0.35;
    rect(ctx,hx+1,hy+16,4,3,skin.blush);
    rect(ctx,hx+19,hy+16,4,3,skin.blush);
    ctx.globalAlpha=0.2;
    rect(ctx,hx+2,hy+15,3,1,skin.blush);
    rect(ctx,hx+19,hy+15,3,1,skin.blush);
    ctx.globalAlpha=1;
  }

  // --- HAIR ---
  const hb=hair.base, hs=hair.shadow, hh=hair.highlight;
  // All styles start with top-of-head coverage
  rect(ctx,hx+1,hy-2,22,6,hb);
  rect(ctx,hx+2,hy-3,20,4,hb);
  rect(ctx,hx+4,hy-4,16,3,hb);
  // Top highlight
  rect(ctx,hx+5,hy-3,10,2,hh);
  rect(ctx,hx+4,hy-2,6,1,hh);

  switch(hairIdx % 10){
    case 0: // Long flowing
      rect(ctx,hx-2,hy,3,26,hb);rect(ctx,hx+23,hy,3,26,hb);
      rect(ctx,hx-1,hy-1,2,24,hh);rect(ctx,hx+24,hy-1,1,20,hh);
      rect(ctx,hx-3,hy+10,3,18,hb);rect(ctx,hx+24,hy+10,3,18,hb);
      rect(ctx,hx-2,hy+12,2,14,hs);rect(ctx,hx+25,hy+12,1,12,hs);
      // Strand details
      for(let i=0;i<4;i++){px(ctx,hx-2,hy+20+i*2,hh);px(ctx,hx+25,hy+18+i*2,hh);}
      if(hasFringe){rect(ctx,hx+2,hy+2,8,4,hb);rect(ctx,hx+3,hy+2,4,3,hh);px(ctx,hx+5,hy+5,hb);}
      break;
    case 1: // Bob with bangs
      rect(ctx,hx-1,hy,2,18,hb);rect(ctx,hx+23,hy,2,18,hb);
      rect(ctx,hx-2,hy+4,3,12,hb);rect(ctx,hx+23,hy+4,3,12,hb);
      rect(ctx,hx-1,hy+2,2,8,hh);
      // Bangs
      rect(ctx,hx+2,hy+1,20,4,hb);rect(ctx,hx+3,hy+2,8,2,hh);
      rect(ctx,hx+2,hy+4,6,2,hb);
      // Bob curl ends
      rect(ctx,hx-2,hy+15,4,2,hh);rect(ctx,hx+22,hy+15,4,2,hh);
      break;
    case 2: // High ponytail
      rect(ctx,hx-1,hy,2,12,hb);rect(ctx,hx+23,hy,2,12,hb);
      // Ponytail going right
      rect(ctx,hx+20,hy-4,6,6,hb);rect(ctx,hx+24,hy-2,4,4,hb);
      rect(ctx,hx+26,hy,3,12,hb);rect(ctx,hx+27,hy+2,2,14,hb);
      rect(ctx,hx+21,hy-3,4,3,hh);rect(ctx,hx+27,hy+4,1,8,hh);
      // Hair tie
      rect(ctx,hx+24,hy-1,2,3,'#d84040');
      if(hasFringe){rect(ctx,hx+2,hy+2,7,3,hb);rect(ctx,hx+3,hy+2,3,2,hh);}
      break;
    case 3: // Pigtails
      rect(ctx,hx-1,hy,2,10,hb);rect(ctx,hx+23,hy,2,10,hb);
      // Left pigtail
      rect(ctx,hx-4,hy+4,4,4,hb);rect(ctx,hx-5,hy+6,4,16,hb);rect(ctx,hx-4,hy+8,3,12,hh);
      // Right pigtail
      rect(ctx,hx+24,hy+4,4,4,hb);rect(ctx,hx+25,hy+6,4,16,hb);rect(ctx,hx+25,hy+8,3,12,hh);
      // Hair ties
      rect(ctx,hx-3,hy+5,3,2,'#ff70a8');rect(ctx,hx+24,hy+5,3,2,'#ff70a8');
      // Bangs
      rect(ctx,hx+2,hy+1,20,4,hb);rect(ctx,hx+4,hy+2,6,2,hh);
      rect(ctx,hx+8,hy+4,8,2,hb);
      break;
    case 4: // Short pixie
      rect(ctx,hx-1,hy-1,2,10,hb);rect(ctx,hx+23,hy-1,2,8,hb);
      rect(ctx,hx,hy,24,5,hb);rect(ctx,hx+2,hy+1,10,3,hh);
      // Textured top
      for(let i=0;i<5;i++){px(ctx,hx+4+i*3,hy-4+Math.floor(rng()*2),hb);px(ctx,hx+3+i*3,hy-3,hh);}
      rect(ctx,hx+6,hy-5,12,3,hb);rect(ctx,hx+8,hy-4,6,2,hh);
      break;
    case 5: // Curly/wavy
      rect(ctx,hx-2,hy-1,3,22,hb);rect(ctx,hx+23,hy-1,3,22,hb);
      rect(ctx,hx-3,hy+6,3,16,hb);rect(ctx,hx+24,hy+6,3,16,hb);
      // Curly texture
      for(let i=0;i<6;i++){
        const cy=hy+4+i*3;
        px(ctx,hx-3,cy,hh);px(ctx,hx-2,cy+1,hs);
        px(ctx,hx+25,cy,hh);px(ctx,hx+24,cy+1,hs);
      }
      // Volume on top
      rect(ctx,hx+3,hy-5,18,4,hb);rect(ctx,hx+6,hy-4,10,2,hh);
      // Curly bangs
      rect(ctx,hx+2,hy+1,8,5,hb);rect(ctx,hx+3,hy+2,3,2,hh);
      px(ctx,hx+6,hy+4,hh);px(ctx,hx+4,hy+5,hb);
      break;
    case 6: // Elegant bun
      rect(ctx,hx-1,hy,2,12,hb);rect(ctx,hx+23,hy,2,12,hb);
      // Bun on top
      rect(ctx,hx+8,hy-8,8,6,hb);rect(ctx,hx+7,hy-7,10,5,hb);
      rect(ctx,hx+9,hy-7,6,3,hh);rect(ctx,hx+10,hy-6,4,1,lighten(hh,0.2));
      // Pin/ornament
      rect(ctx,hx+14,hy-6,2,2,'#ffd700');px(ctx,hx+15,hy-7,'#ffd700');
      // Side strands
      rect(ctx,hx,hy+4,2,8,hb);rect(ctx,hx+22,hy+4,2,8,hb);
      if(hasFringe){rect(ctx,hx+2,hy+2,7,3,hb);rect(ctx,hx+3,hy+2,3,2,hh);}
      break;
    case 7: // Side-swept
      rect(ctx,hx-1,hy,2,14,hb);rect(ctx,hx+23,hy,2,10,hb);
      // Big side sweep
      rect(ctx,hx+1,hy+1,14,5,hb);rect(ctx,hx+2,hy+2,6,3,hh);
      rect(ctx,hx-2,hy+4,4,6,hb);rect(ctx,hx-3,hy+6,3,10,hb);
      rect(ctx,hx-2,hy+8,2,6,hh);
      // Sweep across forehead
      rect(ctx,hx+2,hy+4,12,2,hb);rect(ctx,hx+3,hy+4,4,1,hh);
      break;
    case 8: // Braids
      rect(ctx,hx-1,hy,2,10,hb);rect(ctx,hx+23,hy,2,10,hb);
      // Left braid
      for(let i=0;i<7;i++){
        const by2=hy+8+i*3;
        rect(ctx,hx-3,by2,3,2,(i%2)?hb:hh);
        rect(ctx,hx-4,by2+1,2,2,(i%2)?hh:hb);
      }
      // Right braid
      for(let i=0;i<7;i++){
        const by2=hy+8+i*3;
        rect(ctx,hx+24,by2,3,2,(i%2)?hb:hh);
        rect(ctx,hx+25,by2+1,2,2,(i%2)?hh:hb);
      }
      // Braid ties
      rect(ctx,hx-3,hy+28,3,2,'#ffd700');rect(ctx,hx+24,hy+28,3,2,'#ffd700');
      // Bangs
      rect(ctx,hx+2,hy+1,20,4,hb);rect(ctx,hx+8,hy+2,8,2,hh);
      rect(ctx,hx+3,hy+4,6,2,hb);rect(ctx,hx+15,hy+4,5,2,hb);
      break;
    case 9: // Messy/spiky
      rect(ctx,hx-1,hy-1,2,10,hb);rect(ctx,hx+23,hy-1,2,10,hb);
      // Spiky top
      rect(ctx,hx+2,hy-3,20,6,hb);
      for(let i=0;i<6;i++){
        const sx=hx+2+i*3+Math.floor(rng()*2);
        const sh=3+Math.floor(rng()*4);
        rect(ctx,sx,hy-3-sh,3,sh,hb);rect(ctx,sx+1,hy-2-sh,1,sh-1,hh);
      }
      // Messy bangs
      rect(ctx,hx+2,hy+2,8,4,hb);rect(ctx,hx+14,hy+3,6,3,hb);
      rect(ctx,hx+3,hy+3,3,2,hh);
      break;
  }

  // --- ACCESSORIES ---
  switch(acc){
    case 'bow':
      rect(ctx,hx+15,hy-2,4,3,'#ff4080');rect(ctx,hx+13,hy-1,2,2,'#ff4080');
      rect(ctx,hx+19,hy-1,2,2,'#ff4080');rect(ctx,hx+16,hy-1,2,1,'#ff60a0');
      px(ctx,hx+17,hy-1,'#d03060');
      break;
    case 'flower_crown':
      for(let i=0;i<4;i++){
        const fx=hx+3+i*5,fy=hy-3;
        rect(ctx,fx,fy,3,3,['#ff6080','#ffb040','#80d0ff','#ff80c0'][i]);
        px(ctx,fx+1,fy+1,'#ffd700');
      }
      rect(ctx,hx+2,hy-1,20,1,'#40a040');
      break;
    case 'headband':
      rect(ctx,hx,hy+1,24,2,'#d84040');rect(ctx,hx+2,hy+1,20,1,'#f06060');
      break;
    case 'earrings':
      rect(ctx,hx-2,hy+14,2,3,'#ffd700');rect(ctx,hx+24,hy+14,2,3,'#ffd700');
      px(ctx,hx-2,hy+16,'#ff6060');px(ctx,hx+25,hy+16,'#ff6060');
      break;
    case 'necklace':
      rect(ctx,20,33,8,1,'#ffd700');rect(ctx,22,34,4,1,'#ffd700');
      px(ctx,23,35,'#60d0ff');px(ctx,24,35,'#60d0ff');
      break;
    case 'glasses':
      rect(ctx,hx+3,hy+10,6,4,'#404040');rect(ctx,hx+15,hy+10,6,4,'#404040');
      rect(ctx,hx+4,hy+11,4,2,'#a0d8ff');rect(ctx,hx+16,hy+11,4,2,'#a0d8ff');
      rect(ctx,hx+9,hy+11,6,1,'#404040');
      px(ctx,hx+2,hy+11,'#404040');px(ctx,hx+21,hy+11,'#404040');
      break;
    case 'hat':
      rect(ctx,hx-2,hy-2,28,3,shirt.base);rect(ctx,hx+2,hy-8,20,7,shirt.base);
      rect(ctx,hx+3,hy-7,18,2,shirt.highlight);
      rect(ctx,hx+2,hy-2,20,1,shirt.shadow);
      rect(ctx,hx+4,hy-4,14,1,darken(shirt.base,0.7));
      break;
    case 'bandana':
      rect(ctx,hx,hy+1,24,3,shirt.base);rect(ctx,hx+2,hy+1,20,1,shirt.highlight);
      // Knot on side
      rect(ctx,hx+22,hy+2,4,2,shirt.base);rect(ctx,hx+24,hy+4,3,3,shirt.base);
      rect(ctx,hx+25,hy+6,2,2,shirt.shadow);
      break;
    case 'scarf':
      rect(ctx,17,31,14,4,shirt.base);rect(ctx,18,32,12,2,shirt.highlight);
      rect(ctx,28,33,4,6,shirt.base);rect(ctx,29,35,3,4,shirt.shadow);
      break;
  }

  return c.toDataURL();
}

// Build avatar grid
const grid = document.getElementById('avatarGrid');

  const div = document.createElement('div');
  div.className = 'avatar-option' + (i === 0 ? ' selected' : '');

  img.src = url;

// Show preview of first avatar
updatePreview(0);

function selectAvatar(id) {
  selectedAvatarId = id;
  document.querySelectorAll('.avatar-option').forEach((el, i) => {
    el.classList.toggle('selected', i === id);
  });
  updatePreview(id);
}

function updatePreview(id) {
  const preview = document.getElementById('avatarPreview');
  const pctx = preview.getContext('2d');
  const img = new Image();
  img.onload = () => {
    pctx.clearRect(0, 0, 48, 48);
    pctx.drawImage(img, 0, 0);
  };
  img.src = avatarDataUrls[id];
}

}

  toast.textContent = name + ' joined!';

function joinRoom() {
  const name = document.getElementById('nameInput').value.trim();
  if (!name) return;
  socket.emit('joinWithName', { name, avatarId: selectedAvatarId });
  document.getElementById('avatarModal').classList.add('hidden');
}

function requestSpin() {
  if (spinning) return;
  socket.emit('requestSpin');
}

  `;
  flowersEl.appendChild(flower);
}

// ========================================
// WHEEL
// ========================================
const wheelCanvas = document.getElementById('wheel');
const wctx = wheelCanvas.getContext('2d');
let currentAngle = 0;
let spinning = false;

function drawWheel(angle, drawNames) {
  const wheelNames = drawNames || names;
  const segments = wheelNames.length;
  wctx.clearRect(0, 0, 400, 400);

  if (segments === 0) {
    wctx.save();
    wctx.translate(200, 200);
    const emptyGrad = wctx.createRadialGradient(0, 0, 30, 0, 0, 190);
    emptyGrad.addColorStop(0, '#3a2060');
    emptyGrad.addColorStop(1, '#2a1545');
    wctx.beginPath();
    wctx.arc(0, 0, 190, 0, 2 * Math.PI);
    wctx.fillStyle = emptyGrad;
    wctx.fill();
    wctx.strokeStyle = '#ffd700';
    wctx.lineWidth = 2;
    wctx.stroke();
    wctx.fillStyle = '#ffb6c1';
    wctx.font = '12px "Press Start 2P"';
    wctx.textAlign = 'center';
    wctx.fillText('Waiting for', 0, -10);
    wctx.fillText('players...', 0, 15);
    wctx.restore();
    return;
  }

  const segAngle = (2 * Math.PI) / segments;

  wctx.save();
  wctx.translate(200, 200);
  wctx.rotate(angle);

  const maxLen = Math.max(...wheelNames.map(n => n.length));
  let fontSize = 15;
  if (segments > 8 || maxLen > 10) fontSize = 12;
  if (segments > 12 || maxLen > 14) fontSize = 10;

  for (let i = 0; i < segments; i++) {
    const startAngle = i * segAngle;
    const endAngle = startAngle + segAngle;
    const colors = allColors[i % allColors.length];

    const grad = wctx.createRadialGradient(0, 0, 30, 0, 0, 190);
    grad.addColorStop(0, colors[1]);
    grad.addColorStop(1, colors[0]);

    wctx.beginPath();
    wctx.moveTo(0, 0);
    wctx.arc(0, 0, 190, startAngle, endAngle);
    wctx.closePath();
    wctx.fillStyle = grad;
    wctx.fill();

    wctx.strokeStyle = '#ffd700';
    wctx.lineWidth = 2;
    wctx.stroke();

    wctx.save();
    wctx.rotate(startAngle + segAngle / 2);
    wctx.textAlign = 'center';
    wctx.fillStyle = '#2c1810';
    wctx.font = `600 ${fontSize}px "Press Start 2P"`;
    wctx.fillText(wheelNames[i], 110, 5);

    wctx.font = '18px serif';
    wctx.fillText(allEmojis[i % allEmojis.length], 170, 5);
    wctx.restore();
  }

  const centerGrad = wctx.createRadialGradient(0, 0, 5, 0, 0, 28);
  centerGrad.addColorStop(0, '#fff');
  centerGrad.addColorStop(1, '#ffd700');
  wctx.beginPath();
  wctx.arc(0, 0, 28, 0, 2 * Math.PI);
  wctx.fillStyle = centerGrad;
  wctx.fill();
  wctx.strokeStyle = '#8b4513';
  wctx.lineWidth = 3;
  wctx.stroke();

  wctx.font = '20px serif';
  wctx.fillStyle = '#ff69b4';
  wctx.textAlign = 'center';
  wctx.fillText('\u2605', 0, 7);

  wctx.restore();
}

drawWheel(0);

// ========================================
// AUDIO
// ========================================
let audioCtx = null;
let musicPlaying = false;
let musicInterval = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function playNote(freq, startTime, duration, type = 'square', vol = 0.08) {
  const ac = getAudioCtx();
  const osc = ac.createOscillator();
  const gain = ac.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(vol, startTime);
  gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
  osc.connect(gain);
  gain.connect(ac.destination);
  osc.start(startTime);
  osc.stop(startTime + duration);
}

const melody = [
  392, 440, 494, 523, 494, 440, 392, 330,
  294, 330, 392, 440, 392, 330, 294, 262,
  330, 392, 440, 523, 587, 523, 440, 392,
  440, 392, 330, 294, 330, 392, 440, 392,
];

const bassLine = [
  262, 262, 330, 330, 294, 294, 262, 262,
  220, 220, 262, 262, 247, 247, 220, 220,
  262, 262, 330, 330, 349, 349, 330, 330,
  294, 294, 262, 262, 247, 247, 262, 262,
];

function playMusic() {
  const ac = getAudioCtx();
  const noteLen = 0.22;

  function scheduleLoop() {
    const loopStart = ac.currentTime + 0.05;
    for (let i = 0; i < melody.length; i++) {
      const t = loopStart + i * noteLen;
      playNote(melody[i], t, noteLen * 0.9, 'square', 0.06);
      if (i % 2 === 0) playNote(bassLine[i], t, noteLen * 1.8, 'triangle', 0.07);
      if (i % 8 === 0) playNote(melody[i] * 2, t, noteLen * 0.3, 'sine', 0.03);
    }
    return melody.length * noteLen * 1000;
  }

  const dur = scheduleLoop();
  musicInterval = setInterval(scheduleLoop, dur);
}

function stopMusic() {
  if (musicInterval) { clearInterval(musicInterval); musicInterval = null; }
}

function toggleMusic() {
  const btn = document.getElementById('musicBtn');
  if (!musicPlaying) {
    playMusic();
    btn.textContent = 'Music: ON';
    musicPlaying = true;
  } else {
    stopMusic();
    btn.textContent = 'Music: OFF';
    musicPlaying = false;
  }
}

function playSpinTick(progress) {
  const ac = getAudioCtx();
  const pitch = 400 + (1 - progress) * 600;
  const vol = 0.04 + progress * 0.08;
  const len = 0.03 + progress * 0.12;
  playNote(pitch, ac.currentTime, len, 'square', vol);
  if (progress > 0.7) {
    playNote(pitch * 0.5, ac.currentTime, len * 1.5, 'triangle', vol * 0.5);
  }
}

function playWinSound() {
  const ac = getAudioCtx();
  const t = ac.currentTime;
  playNote(523, t, 0.15, 'square', 0.1);
  playNote(659, t + 0.15, 0.15, 'square', 0.1);
  playNote(784, t + 0.3, 0.15, 'square', 0.1);
  playNote(1047, t + 0.45, 0.4, 'square', 0.12);
  playNote(1568, t + 0.5, 0.3, 'sine', 0.06);
  playNote(2093, t + 0.6, 0.4, 'sine', 0.04);
}

// ========================================
// SYNCED SPIN
// ========================================
function doSpin(extraRotations, randomSegment, duration, spinNames) {
  if (spinning) return;
  if (!spinNames || spinNames.length === 0) return;
  spinning = true;
  document.getElementById('spinBtn').disabled = true;

  getAudioCtx();

  const segments = spinNames.length;
  const segAngle = (2 * Math.PI) / segments;

  const targetAngle = currentAngle + extraRotations + randomSegment;
  const startAngle = currentAngle;
  const totalAngle = targetAngle - startAngle;
  const startTime = performance.now();
  let lastTickAngle = startAngle;

  function animate(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / duration, 1);

    let eased;
    if (progress < 0.3) {
      eased = 0.7 * (progress / 0.3);
    } else {
      const slowProgress = (progress - 0.3) / 0.7;
      eased = 0.7 + 0.3 * (1 - Math.pow(1 - slowProgress, 5));
    }

    const angle = startAngle + totalAngle * eased;
    drawWheel(angle, spinNames);

    const segsPassed = Math.floor(angle / segAngle);
    const lastSegs = Math.floor(lastTickAngle / segAngle);
    if (segsPassed !== lastSegs && progress < 0.98) playSpinTick(progress);
    lastTickAngle = angle;

    if (progress < 1) {
      requestAnimationFrame(animate);
    } else {
      currentAngle = angle % (2 * Math.PI);
      const normalizedAngle = (2 * Math.PI - currentAngle % (2 * Math.PI)) % (2 * Math.PI);
      const winnerIndex = Math.floor(normalizedAngle / segAngle) % segments;

      setTimeout(() => {
        showWinner(spinNames[winnerIndex]);
        spinning = false;
        document.getElementById('spinBtn').disabled = false;
      }, 1200);
    }
  }

  requestAnimationFrame(animate);
}

// ========================================
// WINNER DISPLAY
// ========================================
function showWinner(name) {
  playWinSound();
  const overlay = document.getElementById('winnerOverlay');
  document.getElementById('winnerName').textContent = name;
  overlay.classList.add('show');

  const sparklesEl = document.getElementById('winnerSparkles');
  sparklesEl.innerHTML = '';
  const celebChars = ['\u2728', '\u2B50', '\uD83D\uDC96', '\uD83C\uDF1F', '\uD83C\uDF89', '\uD83D\uDCAB', '\uD83C\uDF38', '\uD83C\uDF80', '\uD83D\uDC9C', '\u273F'];
  for (let i = 0; i < 30; i++) {
    const sp = document.createElement('div');
    sp.className = 'sparkle';
    sp.textContent = celebChars[i % celebChars.length];
    sp.style.cssText = `
      left: ${Math.random() * 100}%;
      top: ${Math.random() * 100}%;
      --dur: ${Math.random() * 2 + 1.5}s;
      animation-delay: ${Math.random() * 2}s;
    `;
    sparklesEl.appendChild(sp);
  }
}

function closeOverlay() {
  document.getElementById('winnerOverlay').classList.remove('show');
}
